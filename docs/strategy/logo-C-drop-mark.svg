<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <!-- Boulder Package Testing — Concept C: Drop Arrow Mark -->
  <!-- References ISTA 3A drop / distribution simulation -->
  <defs>
    <style>
      .navy { fill: #0B2545; }
      .teal { fill: #3DA9C7; }
      .navy-stroke { stroke: #0B2545; fill: none; stroke-width: 3; stroke-linejoin: round; stroke-linecap: round; }
      .teal-stroke { stroke: #3DA9C7; fill: none; stroke-width: 3; stroke-linejoin: round; stroke-linecap: round; }
      .wordmark { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; font-weight: 600; }
      .tagline { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; font-weight: 400; letter-spacing: 0.18em; }
    </style>
  </defs>

  <!-- Icon: package above an impact plate, with motion arrows -->
  <g transform="translate(22, 18)">
    <!-- Package (rotated slightly, mid-air) -->
    <g transform="translate(28, 8) rotate(-12)">
      <rect x="0" y="0" width="38" height="32" rx="2" class="teal"/>
      <line x1="0" y1="16" x2="38" y2="16" stroke="#0B2545" stroke-width="1.5" opacity="0.5"/>
      <line x1="19" y1="0" x2="19" y2="32" stroke="#0B2545" stroke-width="1.5" opacity="0.5"/>
    </g>
    <!-- Motion arrows on left of package -->
    <g class="navy-stroke" opacity="0.6">
      <line x1="8" y1="22" x2="22" y2="22"/>
      <polyline points="18,18 22,22 18,26"/>
      <line x1="12" y1="34" x2="22" y2="34"/>
      <polyline points="18,30 22,34 18,38"/>
    </g>
    <!-- Impact plate / ground -->
    <rect x="0" y="68" width="84" height="6" rx="1" class="navy"/>
    <!-- Impact lines below plate -->
    <line class="navy-stroke" x1="8" y1="80" x2="14" y2="86" opacity="0.5"/>
    <line class="navy-stroke" x1="42" y1="82" x2="42" y2="90" opacity="0.5"/>
    <line class="navy-stroke" x1="76" y1="80" x2="70" y2="86" opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <text x="130" y="58" class="wordmark navy" font-size="28">Boulder</text>
  <text x="130" y="88" class="wordmark teal" font-size="28">Package Testing</text>

  <!-- Tagline rule + standards row -->
  <line x1="130" y1="100" x2="450" y2="100" stroke="#0B2545" stroke-width="0.75" opacity="0.4"/>
  <text x="130" y="113" class="tagline navy" font-size="8" opacity="0.7">ISO 11607  ·  ASTM D4169  ·  ASTM F1980  ·  ISTA 3A</text>
</svg>
